<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 전생 탐구</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif KR', 'Georgia', serif;
      background: #0a0015;
      color: #e8d5ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 별 배경 */
    #stars-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* 헤더 */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .crystal {
      font-size: 64px;
      display: block;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #c084fc, #f0abfc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .header p {
      color: #a78bfa;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    /* 입력 영역 */
    .input-section {
      background: rgba(88, 28, 135, 0.25);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(10px);
      margin-bottom: 30px;
    }

    .input-label {
      display: block;
      text-align: center;
      color: #c084fc;
      font-size: 0.9rem;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    #nameInput {
      flex: 1;
      background: rgba(15, 5, 35, 0.7);
      border: 1px solid rgba(168, 85, 247, 0.5);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1.1rem;
      color: #f3e8ff;
      font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }

    #nameInput::placeholder { color: rgba(168, 85, 247, 0.4); }

    #nameInput:focus {
      border-color: #c084fc;
      box-shadow: 0 0 20px rgba(192, 132, 252, 0.25);
    }

    #searchBtn {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 1rem;
      color: #f3e8ff;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 1px;
      transition: all 0.3s;
      white-space: nowrap;
    }

    #searchBtn:hover {
      background: linear-gradient(135deg, #6d28d9, #7c3aed);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
    }

    #searchBtn:active { transform: translateY(0); }
    #searchBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 로딩 */
    #loading {
      display: none;
      text-align: center;
      padding: 50px 20px;
    }

    .orb {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #e879f9, #7c3aed, #1e1b4b);
      margin: 0 auto 24px;
      position: relative;
      animation: pulse-orb 1.5s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
    }

    .orb::before {
      content: '';
      position: absolute;
      top: 12px; left: 18px;
      width: 18px; height: 12px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    @keyframes pulse-orb {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); }
      50% { transform: scale(1.12); box-shadow: 0 0 70px rgba(168, 85, 247, 0.9); }
    }

    .loading-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      margin: 0 3px;
      background: #c084fc;
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-10px); opacity: 1; }
    }

    #loading p {
      color: #a78bfa;
      font-size: 0.95rem;
      margin-top: 16px;
    }

    /* 결과 카드 */
    #result {
      display: none;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: rgba(30, 10, 60, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.5);
      border-radius: 24px;
      padding: 36px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.2), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at center, rgba(124, 58, 237, 0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .result-header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.25);
    }

    .name-badge {
      display: inline-block;
      background: rgba(124, 58, 237, 0.3);
      border: 1px solid rgba(192, 132, 252, 0.4);
      border-radius: 30px;
      padding: 5px 18px;
      font-size: 0.85rem;
      color: #e879f9;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .year-display {
      font-size: 1.5rem;
      color: #f0abfc;
      font-weight: bold;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .era-label {
      font-size: 0.8rem;
      color: rgba(167, 139, 250, 0.6);
    }

    .job-section {
      text-align: center;
      margin: 24px 0;
    }

    .job-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }

    .job-label {
      font-size: 0.75rem;
      color: rgba(167, 139, 250, 0.6);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .job-title {
      font-size: 1.5rem;
      color: #f3e8ff;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .death-section {
      background: rgba(88, 0, 0, 0.2);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      margin: 24px 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .death-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }

    .death-label {
      font-size: 0.75rem;
      color: rgba(252, 165, 165, 0.6);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .death-cause {
      color: #fca5a5;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .story-section {
      margin: 24px 0;
    }

    .story-label {
      font-size: 0.75rem;
      color: rgba(167, 139, 250, 0.6);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    #storyText {
      color: #e8d5ff;
      line-height: 1.85;
      font-size: 0.97rem;
      white-space: pre-wrap;
    }

    .story-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #a78bfa;
      font-size: 0.9rem;
    }

    .story-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(167, 139, 250, 0.3);
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid rgba(168, 85, 247, 0.2);
      margin: 24px 0;
    }

    /* 버튼 영역 */
    .action-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-share {
      flex: 1;
      background: linear-gradient(135deg, #0f766e, #0d9488);
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.95rem;
      color: #f0fdfa;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-share:hover {
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(20, 184, 166, 0.35);
    }

    .btn-copy {
      flex: 1;
      background: rgba(88, 28, 135, 0.4);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.95rem;
      color: #c084fc;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-copy:hover {
      background: rgba(88, 28, 135, 0.6);
      border-color: #c084fc;
      transform: translateY(-2px);
    }

    .btn-retry {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.9rem;
      color: rgba(167, 139, 250, 0.7);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      margin-top: 4px;
    }

    .btn-retry:hover {
      border-color: rgba(168, 85, 247, 0.6);
      color: #a78bfa;
      background: rgba(88, 28, 135, 0.2);
    }

    /* 토스트 알림 */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20, 184, 166, 0.9);
      color: #f0fdfa;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-family: inherit;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 오류 */
    .error-msg {
      background: rgba(127, 29, 29, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fca5a5;
      font-size: 0.9rem;
      text-align: center;
    }

    /* 반응형 */
    @media (max-width: 480px) {
      .header h1 { font-size: 1.5rem; }
      .input-row { flex-direction: column; }
      .result-card { padding: 24px 20px; }
      .action-btns { flex-direction: column; }
    }

    /* 직업 유형 뱃지 */
    .type-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .type-human    { background: rgba(124,58,237,0.3); color: #c084fc; border: 1px solid rgba(192,132,252,0.3); }
    .type-animal   { background: rgba(21,128,61,0.3);  color: #86efac; border: 1px solid rgba(134,239,172,0.3); }
    .type-object   { background: rgba(113,63,18,0.3);  color: #fcd34d; border: 1px solid rgba(252,211,77,0.3); }
    .type-alien    { background: rgba(15,118,110,0.3); color: #5eead4; border: 1px solid rgba(94,234,212,0.3); }
    .type-microbe  { background: rgba(157,23,77,0.3);  color: #f9a8d4; border: 1px solid rgba(249,168,212,0.3); }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="container">
  <div class="header">
    <span class="crystal">🔮</span>
    <h1>나의 전생 탐구</h1>
    <p>이름을 입력하면 당신이 누구였는지 알려드립니다</p>
  </div>

  <div class="input-section">
    <label class="input-label" for="nameInput">당신의 이름은 무엇입니까?</label>
    <div class="input-row">
      <input
        type="text"
        id="nameInput"
        placeholder="이름 입력..."
        maxlength="20"
        autocomplete="off"
      >
      <button id="searchBtn" onclick="explore()">전생 탐구</button>
    </div>
  </div>

  <div id="loading">
    <div class="orb"></div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <p id="loadingMsg">시공간을 가로질러 당신의 전생을 찾고 있습니다...</p>
  </div>

  <div id="result">
    <div class="result-card">
      <div class="result-header">
        <div class="name-badge" id="nameDisplay"></div>
        <div class="year-display" id="yearDisplay"></div>
        <div class="era-label" id="eraLabel"></div>
      </div>

      <div class="job-section">
        <span class="job-icon" id="jobIcon"></span>
        <div class="job-label">전생의 직업 / 정체</div>
        <div class="job-title" id="jobTitle"></div>
        <span class="type-badge" id="typeBadge"></span>
      </div>

      <div class="death-section">
        <span class="death-icon">💀</span>
        <div>
          <div class="death-label">사망 원인</div>
          <div class="death-cause" id="deathCause"></div>
        </div>
      </div>

      <hr class="divider">

      <div class="story-section">
        <div class="story-label">전생 이야기</div>
        <div id="storyText">
          <div class="story-loading">
            <div class="story-spinner"></div>
            <span>이야기를 엮는 중...</span>
          </div>
        </div>
      </div>

      <hr class="divider">

      <div class="action-btns">
        <button class="btn-share" onclick="shareResult()">
          <span>📤</span> 공유하기
        </button>
        <button class="btn-copy" onclick="copyResult()">
          <span>📋</span> 복사하기
        </button>
      </div>
      <button class="btn-retry" onclick="retry()">↺ 다시 탐구하기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── 별 배경 ──────────────────────────────────────────
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      o: Math.random(),
      speed: Math.random() * 0.008 + 0.003,
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.o += s.speed;
      if (s.o > 1) s.o = 0.1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 180, 255, ${s.o})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', initStars);
  initStars();
  drawStars();

  // ── 상태 ──────────────────────────────────────────────
  let currentData = null;

  const typeInfo = {
    human:  { label: '인간',    icon: null },
    animal: { label: '동물',    icon: null },
    object: { label: '무생물',  icon: null },
    alien:  { label: '외계/초자연', icon: null },
    microbe:{ label: '미생물',  icon: null },
  };

  const jobIcons = {
    human:  ['⚔️','🏺','📜','🎭','🔭','🎪','👑','🗡️','🏛️','🔮','🌿','⚗️','🎨','🛡️','🌍'],
    animal: ['🐾','🦁','🐘','🦅','🐦','🐴','🐺','🐈','🦤','🐀'],
    object: ['🪨','🏛️','⚙️','📦','🏰','🗿','🔩','💎','🌋','📜'],
    alien:  ['👽','🛸','🌌','⭐','🔭','🌀','💫','🪐','✨','🌠'],
    microbe:['🦠','🧫','🧪','💉','🔬','⚗️','🫧','🧬','🌡️','💊'],
  };

  function pickJobIcon(type) {
    const arr = jobIcons[type] || jobIcons.human;
    return arr[Math.floor(Math.random() * arr.length)];
  }

  const eraNames = {
    prehistoric: '선사시대',
    neolithic: '신석기 시대',
    ancient_egypt: '고대 이집트',
    mesopotamia: '메소포타미아',
    ancient_greece: '고대 그리스',
    ancient_rome: '고대 로마',
    three_kingdoms_korea: '한국 삼국시대',
    goryeo: '고려 시대',
    joseon: '조선 시대',
    medieval_europe: '중세 유럽',
    mongol: '몽골/중국',
    early_modern: '근세',
    modern: '근대',
    contemporary: '현대',
    fantasy: '신비의 시대',
    all: '알 수 없는 시대',
  };

  // ── 메인 탐구 ─────────────────────────────────────────
  async function explore() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      document.getElementById('nameInput').focus();
      showToast('이름을 입력해주세요!');
      return;
    }

    document.getElementById('searchBtn').disabled = true;
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    const msgs = [
      '시공간을 가로질러 당신의 전생을 찾고 있습니다...',
      '아카식 레코드를 뒤지는 중...',
      '과거의 기억을 소환하고 있습니다...',
      '전생의 문을 열고 있습니다...',
      '수천 년 전의 당신을 깨우는 중...',
    ];
    document.getElementById('loadingMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];

    try {
      // 1단계: 랜덤 전생 정보
      const infoRes = await fetch(`/api/random`);
      if (!infoRes.ok) throw new Error('전생 정보를 불러오지 못했습니다.');
      const info = await infoRes.json();
      currentData = { name, ...info };

      // 결과 패널 표시 (스토리는 아직 로딩 중)
      renderInfo(name, info);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      document.getElementById('searchBtn').disabled = false;

      // 2단계: 스토리 생성
      const storyRes = await fetch('/api/story', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, ...info }),
      });
      const storyData = await storyRes.json();

      if (storyData.error) {
        document.getElementById('storyText').innerHTML =
          `<div class="error-msg">${storyData.error}</div>`;
      } else {
        document.getElementById('storyText').textContent = storyData.story;
        currentData.story = storyData.story;
      }
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      document.getElementById('storyText').innerHTML =
        `<div class="error-msg">오류가 발생했습니다: ${err.message}</div>`;
      document.getElementById('searchBtn').disabled = false;
    }
  }

  function renderInfo(name, info) {
    document.getElementById('nameDisplay').textContent = `✦ ${name} ✦`;
    document.getElementById('yearDisplay').textContent = info.year;
    document.getElementById('eraLabel').textContent = eraNames[info.era] || info.era;
    document.getElementById('jobIcon').textContent = pickJobIcon(info.jobType);
    document.getElementById('jobTitle').textContent = info.job;
    document.getElementById('deathCause').textContent = info.death;

    const typeBadge = document.getElementById('typeBadge');
    const tInfo = typeInfo[info.jobType] || { label: info.jobType };
    typeBadge.textContent = tInfo.label;
    typeBadge.className = `type-badge type-${info.jobType}`;

    document.getElementById('storyText').innerHTML = `
      <div class="story-loading">
        <div class="story-spinner"></div>
        <span>이야기를 엮는 중...</span>
      </div>`;
  }

  function retry() {
    const name = document.getElementById('nameInput').value.trim();
    if (name) {
      document.getElementById('result').style.display = 'none';
      explore();
    } else {
      document.getElementById('result').style.display = 'none';
    }
  }

  // ── 공유 / 복사 ───────────────────────────────────────
  function buildShareText() {
    if (!currentData) return '';
    const { name, year, job, death, story } = currentData;
    let text = `🔮 ${name}의 전생 탐구 결과\n\n`;
    text += `📅 시대: ${year}\n`;
    text += `⚡ 직업/정체: ${job}\n`;
    text += `💀 사망 원인: ${death}\n`;
    if (story) text += `\n${story}\n`;
    text += `\n나의 전생을 알아보세요!`;
    return text;
  }

  async function shareResult() {
    const text = buildShareText();
    if (!text) return;
    if (navigator.share) {
      try {
        await navigator.share({ title: '나의 전생 탐구', text });
        showToast('공유 완료!');
      } catch (e) {
        if (e.name !== 'AbortError') copyToClipboard(text);
      }
    } else {
      copyToClipboard(text);
    }
  }

  function copyResult() {
    const text = buildShareText();
    if (text) copyToClipboard(text);
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('클립보드에 복사됐습니다!');
    }).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('클립보드에 복사됐습니다!');
    });
  }

  // ── 토스트 ────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // 엔터키 지원
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') explore();
  });
</script>
</body>
</html>
